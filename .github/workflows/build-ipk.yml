name: Build ipk for Unison

on:
  push:
    branches:
      - 'master'
      - 'dev'
    paths:
      - 'htdocs/**'
      - 'po/**'
      - 'root/**'
      - 'Makefile'
      - '.github/**'
      - '!.github/ISSUE_TEMPLATE/**'

  pull_request:
    branches:
      - 'master'
      - 'dev'
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'htdocs/**'
      - 'root/**'
      - 'Makefile'
      - '.github/**'
      - '!.github/ISSUE_TEMPLATE/**'

  release:
    types:
      - published

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout source tree
        uses: actions/checkout@v6

      - name: Checkout apk
        uses: actions/checkout@v6
        with:
          repository: 'alpinelinux/apk-tools'
          path: 'apk-tools'
          fetch-depth: 0
          ref: 'b5a31c0d865342ad80be10d68f1bb3d3ad9b0866'

      - name: Checkout po2lmo
        uses: actions/checkout@v6
        with:
          repository: 'openwrt/luci'
          path: 'po2lmo'
          sparse-checkout: 'modules/luci-base/src'

      - name: Setup dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E rm -rf /var/lib/man-db/auto-update
          sudo -E apt-get update -qq
          sudo -E apt-get install -y build-essential curl fakeroot libssl-dev lua5.1 meson ninja-build

          pushd apk-tools
          meson setup build \
            -Db_lto=true \
            -Dcompressed-help=false \
            -Ddocs=disabled \
            -Dhelp=enabled \
            -Dlua_version=5.1 \
            -Ddefault_library=static \
            -Durl_backend=wget \
            -Dzstd=false \
            -Dpython=disabled \
            -Dtests=disabled \
            -Dcrypto_backend=openssl
          ninja -C build
          sudo -E meson install -C build --strip
          popd

          pushd po2lmo/modules/luci-base/src
          make po2lmo
          sudo -E install -m0755 -s po2lmo /usr/local/bin/po2lmo
          popd

          curl -fLO "https://raw.githubusercontent.com/openwrt/openwrt/master/scripts/ipkg-build"
          sudo install -m0755 ipkg-build /usr/local/bin/ipkg-build

      - name: Build ipk file
        run: |
          pushd .github
          fakeroot bash build-ipk.sh apk "${{ github.event_name }}"
          fakeroot bash build-ipk.sh ipk "${{ github.event_name }}"
          echo "APK_ASSET_NAME=$(ls *.apk)" >> $GITHUB_ENV
          echo "IPK_ASSET_NAME=$(ls *.ipk)" >> $GITHUB_ENV
          popd

      - name: Publishing APK files to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: ${{ env.APK_ASSET_NAME }}
          path: .github/${{ env.APK_ASSET_NAME }}
          archive: false

      - name: Publishing IPK files to GitHub Artifacts
        uses: actions/upload-artifact@v7
        if: github.event_name != 'release'
        with:
          name: ${{ env.IPK_ASSET_NAME }}
          path: .github/${{ env.IPK_ASSET_NAME }}
          archive: false

      - name: Publishing to GitHub Releases
        uses: svenstaro/upload-release-action@v2
        if: github.event_name == 'release'
        with:
          repo_token: ${{ github.token }}
          file: .github/luci-app-unison_*.*
          file_glob: true
          tag: ${{ github.ref }}

      - name: Generate signed APK repository index
        if: github.event_name == 'release'
        env:
          APK_SIGNING_KEY: ${{ secrets.APK_SIGNING_KEY }}
        run: |
          echo "$APK_SIGNING_KEY" > /tmp/signing.pem
          chmod 600 /tmp/signing.pem
          apk mkndx --sign-key /tmp/signing.pem \
            -o .github/APKINDEX.tar.gz \
            .github/*.apk
          rm -f /tmp/signing.pem

      - name: Deploy APK repository to GitHub Pages
        if: github.event_name == 'release'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git fetch origin
          if git ls-remote --exit-code --heads origin gh-pages; then
            git worktree add /tmp/gh-pages origin/gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/gh-pages
          fi

          cp .github/*.apk /tmp/gh-pages/
          cp .github/APKINDEX.tar.gz /tmp/gh-pages/

          cd /tmp/gh-pages
          git add .
          git diff-index --quiet HEAD 2>/dev/null || \
            git commit -m "deploy: APK repository for ${{ github.ref_name }}"
          git push origin gh-pages
